// ─── TOOL 2: ONLINE CALCULATOR ────────────────────────────
function OnlineCalculator() {
const [display, setDisplay] = useState(“0”);
const [expression, setExpression] = useState(””);
const [history, setHistory] = useState([]);

function safeMath(expr) {
try {
const tokens = []; let i = 0;
const s = expr.replace(/\s/g, “”);
while (i < s.length) {
if (“0123456789.”.includes(s[i])) {
let num = “”;
while (i < s.length && “0123456789.”.includes(s[i])) { num += s[i]; i++; }
tokens.push({ type: “num”, value: parseFloat(num) });
} else if (”+-×÷*/^%”.includes(s[i])) {
let op = s[i]; if (op === “×”) op = “*”; if (op === “÷”) op = “/”;
tokens.push({ type: “op”, value: op }); i++;
} else if (s[i] === “(”) { tokens.push({ type: “lparen” }); i++; }
else if (s[i] === “)”) { tokens.push({ type: “rparen” }); i++; }
else if (s[i] === “π”) { tokens.push({ type: “num”, value: Math.PI }); i++; }
else { i++; }
}
let pos = 0;
function peek() { return tokens[pos]; }
function consume() { return tokens[pos++]; }
function parseExpr() {
let left = parseTerm();
while (peek() && peek().type === “op” && “+-”.includes(peek().value)) {
const op = consume().value; const right = parseTerm();
left = op === “+” ? left + right : left - right;
}
return left;
}
function parseTerm() {
let left = parsePower();
while (peek() && peek().type === “op” && “*/%”.includes(peek().value)) {
const op = consume().value; const right = parsePower();
if (op === “*”) left *= right; else if (op === “/”) left /= right; else left %= right;
}
return left;
}
function parsePower() {
let base = parseUnary();
while (peek() && peek().type === “op” && peek().value === “^”) { consume(); base = Math.pow(base, parseUnary()); }
return base;
}
function parseUnary() {
if (peek() && peek().type === “op” && peek().value === “-”) { consume(); return -parseUnary(); }
return parsePrimary();
}
function parsePrimary() {
const t = peek(); if (!t) return 0;
if (t.type === “num”) { consume(); return t.value; }
if (t.type === “lparen”) { consume(); const val = parseExpr(); if (peek() && peek().type === “rparen”) consume(); return val; }
consume(); return 0;
}
const result = parseExpr();
if (isNaN(result) || !isFinite(result)) return “Error”;
return Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(10)).toString();
} catch { return “Error”; }
}

const press = (val) => {
if (val === “C”) { setDisplay(“0”); setExpression(””); }
else if (val === “⌫”) { setDisplay(display.length > 1 ? display.slice(0, -1) : “0”); setExpression(expression.slice(0, -1)); }
else if (val === “=”) {
const result = safeMath(expression || display);
setHistory(prev => […prev.slice(-9), { expr: expression || display, result }]);
setDisplay(result); setExpression(””);
} else {
if (display === “0” && !”+-×÷.(”.includes(val)) { setDisplay(val); setExpression(val); }
else { setDisplay(display + val); setExpression(expression + val); }
}
};
